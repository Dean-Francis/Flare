<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Flare — Dashboard</title>
	<style>
		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		body {
			display: flex;
			height: 100vh;
			background: #0d0f14;
			color: #e2e4ea;
			font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			font-size: 14px;
			overflow: hidden;
		}

		/* ── Sidebar ── */
		.sidebar {
			width: 200px;
			flex-shrink: 0;
			background: #111318;
			border-right: 1px solid #1e2028;
			display: flex;
			flex-direction: column;
			padding: 24px 0 16px;
			gap: 4px;
		}

		.sidebar-brand {
			font-size: 16px;
			font-weight: 700;
			letter-spacing: 0.06em;
			color: #fff;
			padding: 0 20px 24px;
		}

		.sidebar-brand span {
			color: #f97316;
		}

		.nav-item {
			display: flex;
			align-items: center;
			gap: 10px;
			padding: 9px 20px;
			border-radius: 0;
			cursor: pointer;
			color: #6b7280;
			font-size: 13px;
			font-weight: 500;
			transition: background 0.15s, color 0.15s;
			user-select: none;
			border: none;
			background: none;
			width: 100%;
			text-align: left;
		}

		.nav-item svg {
			width: 16px;
			height: 16px;
			flex-shrink: 0;
		}

		.nav-item:hover {
			background: #1a1d24;
			color: #e2e4ea;
		}

		.nav-item.active {
			background: #1a1d24;
			color: #f97316;
		}

		.sidebar-spacer {
			flex: 1;
		}

		/* ── Main content ── */
		.main {
			flex: 1;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		.topbar {
			padding: 20px 28px;
			border-bottom: 1px solid #1e2028;
			display: flex;
			align-items: center;
			justify-content: space-between;
		}

		.topbar-title {
			font-size: 16px;
			font-weight: 600;
			color: #fff;
		}

		.topbar-sub {
			font-size: 12px;
			color: #4b5563;
			margin-top: 2px;
		}

		.content {
			flex: 1;
			overflow-y: auto;
			padding: 24px 28px;
		}

		/* ── Views ── */
		.view {
			display: none;
		}

		.view.active {
			display: block;
		}

		/* ── Dashboard table ── */
		.table-wrap {
			background: #111318;
			border: 1px solid #1e2028;
			border-radius: 10px;
			overflow: hidden;
		}

		.empty-state {
			padding: 48px;
			text-align: center;
			color: #4b5563;
			font-size: 13px;
		}

		table {
			width: 100%;
			border-collapse: collapse;
		}

		thead th {
			padding: 12px 16px;
			text-align: left;
			font-size: 11px;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.06em;
			color: #4b5563;
			border-bottom: 1px solid #1e2028;
			white-space: nowrap;
		}

		tbody tr {
			transition: background 0.12s;
		}

		tbody tr:hover {
			background: #16191f;
		}

		tbody tr+tr td {
			border-top: 1px solid #1a1d24;
		}

		td {
			padding: 12px 16px;
			vertical-align: top;
			font-size: 13px;
			line-height: 1.5;
		}

		.cell-body {
			max-width: 420px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
			color: #9ca3af;
		}

		.cell-time {
			white-space: nowrap;
			color: #4b5563;
			font-size: 12px;
		}

		/* Label badge */
		.badge {
			display: inline-block;
			padding: 2px 10px;
			border-radius: 999px;
			font-size: 11px;
			font-weight: 600;
			white-space: nowrap;
		}

		.badge.phishing {
			background: #450a0a;
			color: #f87171;
		}

		.badge.legitimate {
			background: #14532d;
			color: #4ade80;
		}

		/* Override dropdown */
		.override-select {
			background: #1a1d24;
			border: 1px solid #2a2d36;
			color: #e2e4ea;
			font-size: 12px;
			padding: 4px 8px;
			border-radius: 6px;
			cursor: pointer;
			outline: none;
			transition: border-color 0.15s;
		}

		.override-select:hover {
			border-color: #4b5563;
		}

		.override-select.overridden {
			border-color: #f97316;
			color: #f97316;
		}

		/* ── Settings view ── */
		.settings-card {
			background: #111318;
			border: 1px solid #1e2028;
			border-radius: 10px;
			padding: 24px;
			max-width: 440px;
		}

		.settings-card h2 {
			font-size: 14px;
			font-weight: 600;
			color: #fff;
			margin-bottom: 6px;
		}

		.settings-card p {
			font-size: 12px;
			color: #4b5563;
			margin-bottom: 16px;
			line-height: 1.6;
		}

		.field-label {
			font-size: 11px;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.05em;
			color: #6b7280;
			margin-bottom: 6px;
		}

		.field-row {
			display: flex;
			gap: 8px;
		}

		input[type="text"] {
			flex: 1;
			background: #1a1d24;
			border: 1px solid #2a2d36;
			border-radius: 7px;
			color: #e2e4ea;
			font-size: 13px;
			padding: 8px 12px;
			outline: none;
			font-family: inherit;
			transition: border-color 0.15s;
		}

		input[type="text"]:focus {
			border-color: #4b5563;
		}

		input[type="text"]::placeholder {
			color: #374151;
		}

		.save-btn {
			background: #f97316;
			color: #fff;
			border: none;
			border-radius: 7px;
			padding: 8px 18px;
			font-size: 13px;
			font-weight: 600;
			cursor: pointer;
			transition: background 0.15s;
			white-space: nowrap;
		}

		.save-btn:hover {
			background: #ea6c0a;
		}

		.save-feedback {
			font-size: 12px;
			color: #4ade80;
			margin-top: 10px;
			min-height: 18px;
		}

		/* Scrollbar */
		.content::-webkit-scrollbar {
			width: 6px;
		}

		.content::-webkit-scrollbar-track {
			background: transparent;
		}

		.content::-webkit-scrollbar-thumb {
			background: #1e2028;
			border-radius: 3px;
		}
	</style>
</head>

<body>

	<!-- Sidebar -->
	<nav class="sidebar">
		<div class="sidebar-brand">FL<span>A</span>RE</div>

		<button class="nav-item active" data-view="dashboard">
			<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
				stroke-linecap="round" stroke-linejoin="round">
				<rect x="3" y="3" width="7" height="7" />
				<rect x="14" y="3" width="7" height="7" />
				<rect x="14" y="14" width="7" height="7" />
				<rect x="3" y="14" width="7" height="7" />
			</svg>
			Emails
		</button>

		<button class="nav-item" data-view="settings">
			<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
				stroke-linecap="round" stroke-linejoin="round">
				<circle cx="12" cy="12" r="3" />
				<path
					d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
			</svg>
			Settings
		</button>

		<div class="sidebar-spacer"></div>
	</nav>

	<!-- Main -->
	<div class="main">
		<div class="topbar">
			<div>
				<div class="topbar-title" id="topbarTitle">Flagged Emails</div>
				<div class="topbar-sub" id="topbarSub">Emails you have manually flagged for training
				</div>
			</div>
		</div>

		<div class="content">

			<!-- Dashboard view -->
			<div class="view active" id="view-dashboard">
				<div class="table-wrap">
					<div class="empty-state" id="emptyState">Loading…</div>
					<table id="emailTable" style="display:none">
						<thead>
							<tr>
								<th>Body</th>
								<th>Label</th>
								<th>Flagged</th>
								<th>Override</th>
							</tr>
						</thead>
						<tbody id="emailTableBody"></tbody>
					</table>
				</div>
			</div>

			<!-- Settings view -->
			<div class="view" id="view-settings">
				<div class="settings-card">
					<h2>User Identity</h2>
					<p>This ID is sent with every flag request so your corrections are attributed to
						your local model. Leave blank to use "anonymous".</p>
					<div class="field-label">User ID</div>
					<div class="field-row">
						<input type="text" id="userIdInput"
							placeholder="e.g. alice@company.com" />
						<button class="save-btn" id="saveUserIdBtn">Save</button>
					</div>
					<div class="save-feedback" id="saveFeedback"></div>
				</div>
			</div>

		</div>
	</div>

	<script src="dashboard.js"></script>
</body>

</html>
